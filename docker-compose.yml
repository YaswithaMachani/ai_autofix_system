services:
  # Isolated test runner — repo mounted read-only; work happens in container only.
  sandbox:
    build:
      context: .
      dockerfile: sandbox/Dockerfile
    image: ai-autofix-sandbox
    network_mode: none
    read_only: true
    tmpfs:
      - /tmp:size=64m
      - /workspace:size=512m
    volumes:
      - .:/repo:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # Orchestrator API — for n8n webhooks; logs volume only (no source bind in production).
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3847}:3847"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    profiles:
      - orchestrator
    security_opt:
      - no-new-privileges:true

  # Autofix worker — one-shot pipeline (use in n8n Execute Command alternative)
  autofix-worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./sample-app:/app/sample-app
    command: ["node", "scripts/autofix.js"]
    profiles:
      - worker
    security_opt:
      - no-new-privileges:true
